<!DOCTYPE html><html lang="ja"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英検100本ノック V25 Custom</title>
    <style>
        :root { --primary: #1a73e8; --success: #34a853; --danger: #d93025; --bg: #f0f2f5; --gray: #70757a; }
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: var(--bg); }
        #app-container { background: white; padding: 1.5rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 420px; text-align: center; }
        .btn { border: none; border-radius: 12px; cursor: pointer; font-weight: bold; transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); }

        #menu-view { display: block; text-align: left; }
        .menu-title { font-size: 1.6rem; font-weight: bold; margin-bottom: 1rem; color: #202124; text-align: center; }
        .category-group { margin-bottom: 0.8rem; border-bottom: 1px solid #eee; padding-bottom: 0.5rem; }
        .group-label { font-size: 0.85rem; font-weight: bold; color: var(--primary); margin-bottom: 5px; display: block; }
        .check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .check-item { display: flex; align-items: center; cursor: pointer; padding: 8px; border-radius: 8px; border: 1px solid #f0f0f0; font-size: 0.85rem; }
        .check-item input { margin-right: 8px; width: 18px; height: 18px; }
        #start-btn { width: 100%; padding: 1.2rem; background: var(--primary); color: white; font-size: 1.2rem; margin-top: 15px; }

        #game-view { display: none; }
        .status-bar { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--gray); margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        #word-container { height: 5rem; display: flex; align-items: center; justify-content: center; margin: 0.5rem 0; }
        #word { font-size: 2.8rem; font-weight: bold; color: var(--primary); word-break: break-word; line-height: 1.1; }
        
        #answer-section { height: 160px; margin: 10px 0; padding: 15px; background: #fafafa; border-radius: 12px; border: 1px dashed #ccc; text-align: center; box-sizing: border-box; overflow-y: auto; }
        #meaning { font-size: 1.6rem; font-weight: bold; color: #202124; margin-bottom: 8px; visibility: hidden; }
        #example-en { font-size: 0.9rem; color: var(--gray); font-style: italic; text-align: left; }
        #example-ja { font-size: 0.85rem; color: var(--primary); text-align: left; margin-top: 5px; font-weight: 500; visibility: hidden; }
        
        #action-area { width: 100%; height: 130px; margin-top: 10px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
        .main-btn { width: 100%; height: 60px; font-size: 1.2rem; }
        #btn-check { background: var(--primary); color: white; }
        #judgement-buttons { display: none; width: 100%; flex-direction: column; align-items: center; }
        #btn-correct { background: var(--success); color: white; margin-bottom: 10px; }
        #btn-wrong { width: 70%; height: 45px; background: var(--danger); color: white; font-size: 1rem; }
        .game-nav { display: flex; justify-content: center; gap: 20px; margin-top: 20px; padding-top: 10px; border-top: 1px solid #eee; }
        .nav-link { font-size: 0.85rem; color: var(--gray); text-decoration: underline; cursor: pointer; }

        #result-view { display: none; }
        .graphic-container { width: 100%; height: 160px; margin-bottom: 1rem; display: flex; align-items: center; justify-content: center; }
        #result-score { font-size: 4.5rem; font-weight: bold; margin: 0; color: #202124; }
        #result-msg { font-size: 1.2rem; font-weight: bold; margin: 15px 0 25px; }
        .result-actions { display: flex; flex-direction: column; gap: 12px; }
* {
    touch-action: manipulation;
  }

    </style></head><body><div id="app-container">
    <div id="menu-view">
        <div class="menu-title">英検100本ノック</div>
        <div id="selection-area"></div>
        <button id="start-btn" class="btn" onclick="prepareLearning()">ノック開始 (100問)</button>
    </div>

    <div id="game-view">
        <div class="status-bar">
            <div>問: <span id="cur-idx">0</span> / 100</div>
            <div>正答率: <span id="realtime-acc" style="color:var(--success); font-weight:bold;">0%</span></div>
            <div>ミス: <span id="wrong-count" style="color:var(--danger)">0</span></div>
        </div>
        <div id="word-container"><div id="word">...</div></div>
        <div id="answer-section">
            <div id="meaning">意味</div>
            <div id="example-en">Example sentence</div>
            <div id="example-ja">例文の和訳</div>
        </div>
        <div id="action-area">
            <div id="check-area" style="width: 100%;"><button id="btn-check" class="btn main-btn" onclick="showAnswer()">意味を確認</button></div>
            <div id="judgement-buttons">
                <button id="btn-correct" class="btn main-btn" onclick="handleResult(true)">わかった！</button>
                <button id="btn-wrong" class="btn" onclick="handleResult(false)">間違えた</button>
            </div>
        </div>
        <div class="game-nav">
            <span class="nav-link" onclick="resetCurrentSession()">リセット</span>
            <span id="nav-review-link" class="nav-link" style="color:var(--danger); display:none;" onclick="jumpToReview()">間違いを特訓</span>
            <span class="nav-link" onclick="confirmBackToMenu()">メニューへ</span>
        </div>
    </div>

    <div id="result-view">
        <div id="graphic-box" class="graphic-container"></div>
        <div id="result-score">0%</div><div id="result-msg"></div>
        <div class="result-actions">
            <button id="res-review-btn" class="btn" style="height:60px; background:var(--danger); color:white;" onclick="jumpToReview()">間違いを復習する</button>
            <button class="btn" style="height:50px; background:var(--primary); color:white;" onclick="backToMenu()">メニューへ戻る</button>
        </div>
    </div>
</div><script src="word-data.js"></script><script>
    let masterData = []; let currentQueue = []; let wrongList = [];
    let isReviewMode = false; let totalAttempted = 0; let correctCount = 0;
    let backupState = null;

    // 出やすくしたい重要単語リスト（数は自由に変更可能）
    const importantWords = [
        "outcome", "transform", "take part in", "deal with", "figure out"
    ];

    const categories = { 'pre2': '準2級', 'pre2plus': '準2級プラス', 'grade2': '2級' };

    function initMenu() {
        const area = document.getElementById('selection-area');
        area.innerHTML = '';
        Object.keys(categories).forEach(key => {
            const group = document.createElement('div');
            group.className = 'category-group';
            group.innerHTML = `<span class="group-label">${categories[key]}</span>
                <div class="check-grid">
                    <label class="check-item"><input type="checkbox" value="${key}_w" checked>単語</label>
                    <label class="check-item"><input type="checkbox" value="${key}_i" checked>熟語</label>
                </div>`;
            area.appendChild(group);
        });
    }

    const graphics = {
        perfect: `<svg viewBox="0 0 200 200" width="140" height="140"><circle cx="100" cy="100" r="90" fill="#fff9c4"/><path d="M100 40 L110 80 L150 80 L120 105 L135 150 L100 125 L65 150 L80 105 L50 80 L90 80 Z" fill="#fbc02d" stroke="#f57f17" stroke-width="5"/></svg>`,
        good: `<svg viewBox="0 0 200 200" width="140" height="140"><circle cx="100" cy="100" r="90" fill="#e8f5e9"/><path d="M60 110 Q100 150 140 110" stroke="#2e7d32" stroke-width="8" fill="none" stroke-linecap="round"/></svg>`,
        fight: `<svg viewBox="0 0 200 200" width="140" height="140"><circle cx="100" cy="100" r="90" fill="#ffebee"/><path d="M70 130 Q100 110 130 130" stroke="#c62828" stroke-width="6" fill="none" stroke-linecap="round"/></svg>`
    };

    function prepareLearning() {
        if (typeof wordData === 'undefined') return alert("word-data.jsが読み込めません");
        const selected = Array.from(document.querySelectorAll('#selection-area input:checked')).map(el => el.value);
        if (selected.length === 0) return alert("項目を選んでください");
        
        // 1. 選択された級の全データを取得（重複削除は廃止！）
        let pool = [];
        selected.forEach(key => { if (wordData[key]) pool = pool.concat(wordData[key]); });

        // 2. 重み付けスコア計算
        pool.forEach(item => {
            let randomScore = Math.random(); 
            // 重要単語の加算を+0.1に抑制。たまに出やすくなる程度の自然な確率に。
            if (importantWords.includes(item.w)) {
                randomScore += 0.1;
            }
            item.sortScore = randomScore;
        });

        // 3. スコア順に上位100問を切り出し、出題順が固定されないよう再度シャッフル
        let selected100 = pool.sort((a, b) => b.sortScore - a.sortScore).slice(0, 100);
        masterData = selected100.sort(() => Math.random() - 0.5);
        
        startSession();
    }

    function startSession() {
        currentQueue = [...masterData]; wrongList = []; isReviewMode = false;
        totalAttempted = 0; correctCount = 0; backupState = null;
        document.getElementById('menu-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'none';
        document.getElementById('game-view').style.display = 'block';
        updateDisplay();
    }

    function jumpToReview() {
        if (wrongList.length === 0) return;
        if (totalAttempted < 100 && !isReviewMode) {
            backupState = { queue: [...currentQueue], attempted: totalAttempted, correct: correctCount };
        }
        currentQueue = [...wrongList]; wrongList = []; isReviewMode = true;
        totalAttempted = 0; correctCount = 0;
        document.getElementById('result-view').style.display = 'none';
        document.getElementById('game-view').style.display = 'block';
        updateDisplay();
    }

    function updateDisplay() {
        if (isReviewMode && currentQueue.length === 0) {
            if (backupState) {
                alert("特訓完了！再開します。");
                currentQueue = [...backupState.queue]; totalAttempted = backupState.attempted;
                correctCount = backupState.correct; isReviewMode = false; backupState = null;
                updateDisplay(); return;
            } else { alert("復習完了！"); backToMenu(); return; }
        }
        if (!isReviewMode && totalAttempted >= 100) { showResult(); return; }

        const cur = currentQueue[0];
        document.getElementById('word').innerText = cur.w;
        document.getElementById('meaning').innerText = cur.m;
        document.getElementById('example-en').innerText = cur.en || "";
        document.getElementById('example-ja').innerText = cur.ja || "";
        
        document.getElementById('cur-idx').innerText = isReviewMode ? "特訓" : totalAttempted + 1;
        document.getElementById('wrong-count').innerText = isReviewMode ? "-" : wrongList.length;
        const acc = totalAttempted === 0 ? 0 : Math.round((correctCount / totalAttempted) * 100);
        document.getElementById('realtime-acc').innerText = isReviewMode ? "特訓中" : acc + "%";
        document.getElementById('nav-review-link').style.display = (!isReviewMode && wrongList.length > 0) ? "inline" : "none";

        document.getElementById('meaning').style.visibility = 'hidden';
        document.getElementById('example-ja').style.visibility = 'hidden';
        document.getElementById('check-area').style.display = 'block';
        document.getElementById('judgement-buttons').style.display = 'none';
    }

    function showAnswer() {
        document.getElementById('meaning').style.visibility = 'visible';
        document.getElementById('example-ja').style.visibility = 'visible';
        document.getElementById('check-area').style.display = 'none';
        document.getElementById('judgement-buttons').style.display = 'flex';
    }

    function handleResult(isCorrect) {
        const item = currentQueue.shift();
        if (!isReviewMode) {
            totalAttempted++;
            if (isCorrect) correctCount++; else wrongList.push(item);
        } else { if (!isCorrect) currentQueue.push(item); }
        updateDisplay();
    }

    function showResult() {
        document.getElementById('game-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'block';
        const acc = Math.round((correctCount / 100) * 100);
        document.getElementById('result-score').innerText = acc + "%";
        const box = document.getElementById('graphic-box');
        const msg = document.getElementById('result-msg');
        if (acc === 100) { box.innerHTML = graphics.perfect; msg.innerText = "完璧！マスター！"; }
        else if (acc >= 80) { box.innerHTML = graphics.good; msg.innerText = "素晴らしい合格圏内！"; }
        else { box.innerHTML = graphics.fight; msg.innerText = "復習して伸ばそう！"; }
        document.getElementById('res-review-btn').style.display = wrongList.length > 0 ? "block" : "none";
    }

    function resetCurrentSession() { if (confirm("最初からリセットしますか？")) prepareLearning(); }
    
    function confirmBackToMenu() { if (confirm("メニューに戻りますか？")) backToMenu(); }
    function backToMenu() {
        document.getElementById('menu-view').style.display = 'block';
        document.getElementById('game-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'none';
        initMenu();
    }
    initMenu();
</script></body></html>
