<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英検100本ノック V25</title>
    <style>
        :root { --primary: #1a73e8; --success: #34a853; --danger: #d93025; --bg: #f0f2f5; --gray: #70757a; }
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: var(--bg); }
        #app-container { background: white; padding: 1.5rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 420px; text-align: center; }
        
        .btn { border: none; border-radius: 12px; cursor: pointer; font-weight: bold; transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); }

        /* メニュー画面 */
        #menu-view { display: block; text-align: left; }
        .menu-title { font-size: 1.6rem; font-weight: bold; margin-bottom: 1.2rem; color: #202124; text-align: center; }
        .category-group { margin-bottom: 1rem; border-bottom: 1px solid #eee; padding-bottom: 0.5rem; }
        .group-label { font-size: 0.85rem; font-weight: bold; color: var(--gray); margin-bottom: 5px; display: block; }
        .check-item { display: flex; align-items: center; margin-bottom: 8px; cursor: pointer; padding: 10px; border-radius: 10px; border: 1px solid #f0f0f0; }
        .check-item input { margin-right: 12px; width: 20px; height: 20px; }
        #start-btn { width: 100%; padding: 1.2rem; background: var(--primary); color: white; font-size: 1.2rem; margin-top: 10px; }

        /* 学習画面 */
        #game-view { display: none; }
        .status-bar { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--gray); margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        /* 単語エリア：高さを固定 */
        #word-container { height: 5rem; display: flex; align-items: center; justify-content: center; margin: 0.5rem 0; }
        #word { font-size: 2.8rem; font-weight: bold; color: var(--primary); word-break: break-word; line-height: 1.1; }
        
        /* 回答エリア：高さを160pxに完全固定 */
        #answer-section { height: 160px; margin: 10px 0; padding: 15px; background: #fafafa; border-radius: 12px; border: 1px dashed #ccc; text-align: center; box-sizing: border-box; }
        #answer-content { visibility: hidden; } /* 中身だけを隠す */
        
        #meaning { font-size: 1.6rem; font-weight: bold; color: #202124; margin-bottom: 8px; }
        #example-en { font-size: 0.9rem; color: var(--gray); font-style: italic; text-align: left; }
        #example-ja { font-size: 0.85rem; color: var(--primary); text-align: left; margin-top: 5px; font-weight: 500; }
        
        /* ボタンスタック：高さを固定して中身を入れ替える */
        #action-area { width: 100%; height: 130px; margin-top: 10px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
        
        .main-btn { width: 100%; height: 60px; font-size: 1.2rem; }
        #btn-check { background: var(--primary); color: white; }
        
        #judgement-buttons { display: none; width: 100%; flex-direction: column; align-items: center; }
        #btn-correct { background: var(--success); color: white; margin-bottom: 10px; }
        #btn-wrong { width: 70%; height: 45px; background: var(--danger); color: white; font-size: 1rem; }

        .game-nav { display: flex; justify-content: center; gap: 20px; margin-top: 20px; padding-top: 10px; border-top: 1px solid #eee; }
        .nav-link { font-size: 0.85rem; color: var(--gray); text-decoration: underline; cursor: pointer; }

        /* リザルト画面 */
        #result-view { display: none; padding-top: 1rem; }
        .graphic-container { width: 100%; height: 160px; margin-bottom: 1rem; display: flex; align-items: center; justify-content: center; }
        #result-score { font-size: 4.5rem; font-weight: bold; margin: 0; color: #202124; }
        #result-msg { font-size: 1.2rem; font-weight: bold; margin: 15px 0 25px; }
        .result-actions { display: flex; flex-direction: column; gap: 12px; }
        .res-btn { width: 100%; padding: 1.1rem; font-size: 1.1rem; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="menu-view">
        <div class="menu-title">英検100本ノック</div>
        <div id="selection-area"></div>
        <button id="start-btn" class="btn" onclick="prepareLearning()">ノック開始 (100問)</button>
    </div>

    <div id="game-view">
        <div class="status-bar">
            <div>問: <span id="cur-idx">0</span> / 100</div>
            <div>正答率: <span id="realtime-acc" style="color:var(--success); font-weight:bold;">0%</span></div>
            <div>ミス: <span id="wrong-count" style="color:var(--danger)">0</span></div>
        </div>
        
        <div id="word-container">
            <div id="word">...</div>
        </div>
        
        <div id="answer-section">
            <div id="answer-content">
                <div id="meaning">意味</div>
                <div id="example-en">Example</div>
                <div id="example-ja">和訳</div>
            </div>
        </div>

        <div id="action-area">
            <div id="check-area" style="width: 100%;">
                <button id="btn-check" class="btn main-btn" onclick="showAnswer()">意味を確認</button>
            </div>
            <div id="judgement-buttons">
                <button id="btn-correct" class="btn main-btn" onclick="handleResult(true)">わかった！</button>
                <button id="btn-wrong" class="btn" onclick="handleResult(false)">間違えた</button>
            </div>
        </div>
        
        <div class="game-nav">
            <span class="nav-link" onclick="resetCurrentSession()">リセット</span>
            <span class="nav-link" onclick="confirmBackToMenu()">メニューへ</span>
        </div>
    </div>

    <div id="result-view">
        <div id="graphic-box" class="graphic-container"></div>
        <div id="result-score">0%</div>
        <div id="result-msg">メッセージ</div>
        <div class="result-actions">
            <button id="res-review-btn" class="btn res-btn" style="background:var(--danger); color:white;" onclick="startWrongMode()">間違いを復習する</button>
            <button class="btn res-btn" style="background:var(--primary); color:white;" onclick="backToMenu()">メニューへ戻る</button>
        </div>
    </div>
</div>

<script src="word-data.js"></script>
<script>
    let masterData = []; let currentQueue = []; let wrongList = [];
    let isReviewMode = false; let totalAttempted = 0; let correctCount = 0;

    const categories = { 'pre2': '英検準2級', 'pre2plus': '英検準2級プラス', 'grade2': '英検2級' };

    function initMenu() {
        const selectionArea = document.getElementById('selection-area');
        selectionArea.innerHTML = '';
        Object.keys(categories).forEach(key => {
            const group = document.createElement('div');
            group.className = 'category-group';
            group.innerHTML = `<span class="group-label">${categories[key]}</span>
                <label class="check-item"><input type="checkbox" value="${key}_w" checked><span>${categories[key]} 単語</span></label>
                <label class="check-item"><input type="checkbox" value="${key}_i" checked><span>${categories[key]} 熟語</span></label>`;
            selectionArea.appendChild(group);
        });
    }

    const graphics = {
        perfect: `<svg viewBox="0 0 200 200" width="140" height="140"><circle cx="100" cy="100" r="90" fill="#fff9c4"/><path d="M100 40 L110 80 L150 80 L120 105 L135 150 L100 125 L65 150 L80 105 L50 80 L90 80 Z" fill="#fbc02d" stroke="#f57f17" stroke-width="5"/><text x="100" y="185" font-family="sans-serif" font-weight="bold" font-size="22" fill="#f57f17" text-anchor="middle">PERFECT!</text></svg>`,
        good: `<svg viewBox="0 0 200 200" width="140" height="140"><circle cx="100" cy="100" r="90" fill="#e8f5e9"/><path d="M60 110 Q100 150 140 110" stroke="#2e7d32" stroke-width="8" fill="none" stroke-linecap="round"/><circle cx="70" cy="80" r="10" fill="#2e7d32"/><circle cx="130" cy="80" r="10" fill="#2e7d32"/><text x="100" y="185" font-family="sans-serif" font-weight="bold" font-size="22" fill="#2e7d32" text-anchor="middle">GREAT!</text></svg>`,
        fight: `<svg viewBox="0 0 200 200" width="140" height="140"><circle cx="100" cy="100" r="90" fill="#ffebee"/><path d="M70 130 Q100 110 130 130" stroke="#c62828" stroke-width="6" fill="none" stroke-linecap="round"/><path d="M65 85 L85 95 M135 85 L115 95" stroke="#c62828" stroke-width="4" stroke-linecap="round"/><text x="100" y="185" font-family="sans-serif" font-weight="bold" font-size="20" fill="#c62828" text-anchor="middle">FIGHT!</text></svg>`
    };

    function prepareLearning() {
        if (typeof wordDatabase === 'undefined') { alert("word-data.jsが見つかりません。"); return; }
        const selected = Array.from(document.querySelectorAll('#selection-area input:checked')).map(el => el.value);
        if (selected.length === 0) { alert("項目を選んでください。"); return; }
        let pool = [];
        selected.forEach(key => { if (wordDatabase[key]) pool = pool.concat(wordDatabase[key]); });
        
        let weightedPool = pool.map(item => ({ item: item, score: Math.random() * (item.p || 1) }));
        weightedPool.sort((a, b) => b.score - a.score);
        masterData = weightedPool.slice(0, 100).map(x => x.item);
        
        for (let i = masterData.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [masterData[i], masterData[j]] = [masterData[j], masterData[i]];
        }
        startSession();
    }

    function startSession() {
        currentQueue = [...masterData]; wrongList = []; isReviewMode = false;
        totalAttempted = 0; correctCount = 0;
        document.getElementById('menu-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'none';
        document.getElementById('game-view').style.display = 'block';
        updateDisplay();
    }

    function updateDisplay() {
        if (!isReviewMode && totalAttempted >= 100) { showResult(); return; }
        if (isReviewMode && currentQueue.length === 0) { alert("復習完了！"); backToMenu(); return; }

        const current = currentQueue[0];
        document.getElementById('word').innerText = current.w;
        document.getElementById('meaning').innerText = current.m;
        document.getElementById('example-en').innerText = current.en;
        document.getElementById('example-ja').innerText = current.ja;
        
        document.getElementById('cur-idx').innerText = isReviewMode ? "特訓中" : totalAttempted + 1;
        document.getElementById('wrong-count').innerText = wrongList.length;
        const acc = totalAttempted === 0 ? 0 : Math.round((correctCount / totalAttempted) * 100);
        document.getElementById('realtime-acc').innerText = acc + "%";

        // レイアウト固定：中身だけ消してボタンを初期状態に
        document.getElementById('answer-content').style.visibility = 'hidden';
        document.getElementById('check-area').style.display = 'block';
        document.getElementById('judgement-buttons').style.display = 'none';
    }

    function showAnswer() {
        document.getElementById('answer-content').style.visibility = 'visible';
        document.getElementById('check-area').style.display = 'none';
        document.getElementById('judgement-buttons').style.display = 'flex';
    }

    function handleResult(isCorrect) {
        const item = currentQueue.shift();
        if (!isReviewMode) {
            totalAttempted++;
            if (isCorrect) { correctCount++; } else { wrongList.push(item); }
        } else {
            if (!isCorrect) currentQueue.push(item);
        }
        updateDisplay();
    }

    function showResult() {
        document.getElementById('game-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'block';
        const finalAcc = Math.round((correctCount / 100) * 100);
        document.getElementById('result-score').innerText = finalAcc + "%";
        const box = document.getElementById('graphic-box');
        const msg = document.getElementById('result-msg');
        if (finalAcc === 100) {
            box.innerHTML = graphics.perfect; msg.innerText = "完璧です！まさにマスター！"; msg.style.color = "#f57f17";
        } else if (finalAcc >= 80) {
            box.innerHTML = graphics.good; msg.innerText = "素晴らしい！合格圏内です！"; msg.style.color = "var(--success)";
        } else {
            box.innerHTML = graphics.fight; msg.innerText = "伸びしろアリ！復習しましょう！"; msg.style.color = "var(--danger)";
        }
        document.getElementById('res-review-btn').style.display = wrongList.length > 0 ? "block" : "none";
    }

    function resetCurrentSession() { if (confirm("最初からリセットしますか？")) startSession(); }
    function confirmBackToMenu() { if (confirm("メニューに戻りますか？")) backToMenu(); }
    function backToMenu() {
        document.getElementById('menu-view').style.display = 'block';
        document.getElementById('game-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'none';
        initMenu();
    }

    initMenu();
</script>
</body>
</html>
